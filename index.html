<!DOCTYPE html>
<html lang="hi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UPSC Mains Question Portal</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Hind:wght@400;500;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    :root {
      --primary: #4f46e5;
      --primary-dark: #3730a3;
      --accent: #f59e0b;
      --success: #10b981;
      --danger: #ef4444;
      --bg: #f0f4ff;
      --card: #fff;
      --text: #1e1b4b;
      --muted: #6b7280;
    }

    body {
      font-family: 'Hind', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
    }

    /* TOP BAR */
    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: var(--primary);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 12px rgba(79, 70, 229, .3);
    }

    .quiz-title {
      font-family: 'Baloo 2', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      flex: 1;
      text-align: center;
    }

    .profile-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 800;
      color: #fff;
      cursor: pointer;
      transition: transform .2s;
      flex-shrink: 0;
    }

    .profile-btn:hover {
      transform: scale(1.08)
    }

    /* PROFILE PANEL */
    .profile-panel {
      display: none;
      position: fixed;
      top: 60px;
      left: 12px;
      z-index: 200;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, .18);
      padding: 20px;
      width: 260px;
      animation: slideRight .25s ease;
    }

    .profile-panel.open {
      display: block
    }

    @keyframes slideRight {
      from {
        opacity: 0;
        transform: translateX(-20px)
      }

      to {
        opacity: 1;
        transform: translateX(0)
      }
    }

    .profile-panel h3 {
      font-family: 'Baloo 2', sans-serif;
      font-size: 17px;
      color: var(--primary);
      margin-bottom: 12px
    }

    .profile-field {
      margin-bottom: 10px
    }

    .profile-field label {
      font-size: 12px;
      color: var(--muted);
      display: block;
      margin-bottom: 3px;
      text-transform: uppercase;
      letter-spacing: .4px
    }

    .profile-field input,
    .profile-field select {
      width: 100%;
      padding: 8px 10px;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Hind', sans-serif;
    }

    .profile-field input:focus,
    .profile-field select:focus {
      outline: none;
      border-color: var(--primary)
    }

    .profile-save-btn {
      width: 100%;
      padding: 9px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
    }

    .profile-close-btn {
      position: absolute;
      top: 10px;
      right: 14px;
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: var(--muted);
    }

    /* MAIN CONTENT */
    .main-wrap {
      padding: 68px 14px 110px;
      max-width: 760px;
      margin: 0 auto;
    }

    /* SUBJECT BLOCK */
    .subject-block {
      background: #fff;
      border-radius: 16px;
      margin-bottom: 20px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(79, 70, 229, .07)
    }

    .subject-hd {
      background: var(--primary);
      color: #fff;
      padding: 14px 18px;
      font-family: 'Baloo 2', sans-serif;
      font-size: 18px;
      font-weight: 800
    }

    .subject-src {
      font-size: 12px;
      color: #c7d2fe;
      font-weight: 400;
      margin-top: 2px
    }

    .topic-block {
      padding: 14px 18px;
      border-top: 1px solid #f0f0f0
    }

    .topic-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--primary-dark);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px
    }

    /* QUESTION ITEM */
    .q-item {
      border: 1.5px solid #e5e7eb;
      border-radius: 12px;
      margin-bottom: 14px;
      overflow: hidden;
      transition: box-shadow .2s;
      position: relative;
    }

    .q-item:hover {
      box-shadow: 0 4px 14px rgba(79, 70, 229, .12)
    }

    .q-header {
      padding: 14px;
      background: #f8f9ff;
    }

    .q-text {
      font-size: 14.5px;
      line-height: 1.7;
      color: #1e1b4b;
      margin-bottom: 10px
    }

    .q-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap
    }

    .demo-btn {
      padding: 7px 14px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
      font-family: 'Hind', sans-serif;
    }

    .demo-btn:hover {
      background: var(--primary-dark)
    }

    .submit-btn {
      padding: 7px 14px;
      background: var(--success);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Hind', sans-serif;
    }

    .submit-btn:hover {
      background: #059669
    }

    .demo-answer {
      display: none;
      padding: 14px;
      border-top: 1.5px solid #e5e7eb;
      background: #fff;
      font-size: 14px;
      line-height: 1.8;
      color: #374151;
    }

    .demo-answer.show {
      display: block;
      animation: slideDown .3s
    }

    @keyframes slideDown {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    /* LOCKED */
    .q-item.locked .q-header {
      filter: blur(5px);
      pointer-events: none;
      user-select: none;
    }

    .lock-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(240, 244, 255, 0.55);
      backdrop-filter: blur(1px);
      border-radius: 12px;
      z-index: 5;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .q-item.locked .lock-overlay {
      display: flex;
    }

    .lock-pill {
      background: var(--primary);
      color: #fff;
      padding: 9px 20px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 700;
      font-family: 'Baloo 2', sans-serif;
      box-shadow: 0 4px 14px rgba(79, 70, 229, .4);
      pointer-events: all;
    }

    /* FAB */
    .fab {
      position: fixed;
      bottom: 22px;
      right: 14px;
      z-index: 150;
      background: var(--accent);
      color: #1e1b4b;
      padding: 13px 20px;
      border-radius: 50px;
      box-shadow: 0 6px 20px rgba(245, 158, 11, .45);
      font-family: 'Baloo 2', sans-serif;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      border: none;
      display: flex;
      align-items: center;
      gap: 8px;
      animation: popIn .5s cubic-bezier(.34, 1.56, .64, 1);
      transition: transform .15s;
    }

    .fab:hover {
      transform: scale(1.05)
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(.5)
      }

      to {
        opacity: 1;
        transform: scale(1)
      }
    }

    /* SUBMIT ALL */
    .submit-all-wrap {
      padding: 10px 0 14px;
      text-align: center
    }

    .submit-all-btn {
      padding: 15px 36px;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: #1e1b4b;
      border: none;
      border-radius: 50px;
      font-family: 'Baloo 2', sans-serif;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(245, 158, 11, .4);
      transition: transform .15s;
    }

    .submit-all-btn:hover {
      transform: scale(1.04)
    }

    /* WHATSAPP */
    .wa-section {
      background: linear-gradient(135deg, #25D366, #128C7E);
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      margin-top: 10px;
    }

    .wa-section h2 {
      color: #fff;
      font-family: 'Baloo 2', sans-serif;
      font-size: 20px;
      margin-bottom: 16px
    }

    .wa-link {
      display: inline-block;
      padding: 12px 32px;
      background: #fff;
      color: #128C7E;
      border-radius: 10px;
      font-weight: 700;
      font-size: 15px;
      font-family: 'Baloo 2', sans-serif;
      text-decoration: none;
      transition: transform .15s;
    }

    .wa-link:hover {
      transform: scale(1.04)
    }

    /* ======== MODAL SYSTEM ======== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 400;
      background: rgba(30, 27, 75, .55);
      backdrop-filter: blur(5px);
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal-box {
      background: #fff;
      border-radius: 20px;
      padding: 28px 22px;
      width: 100%;
      max-width: 380px;
      position: relative;
      animation: modalIn .3s cubic-bezier(.34, 1.56, .64, 1);
    }

    @keyframes modalIn {
      from {
        opacity: 0;
        transform: scale(.85)
      }

      to {
        opacity: 1;
        transform: scale(1)
      }
    }

    .modal-title {
      font-family: 'Baloo 2', sans-serif;
      font-size: 20px;
      color: var(--primary);
      text-align: center;
      margin-bottom: 18px
    }

    .modal-close-btn {
      position: absolute;
      top: 12px;
      right: 16px;
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      color: var(--muted);
    }

    /* FORM INSIDE MODAL */
    .form-group {
      margin-bottom: 14px
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: .4px
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 11px 13px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      font-size: 15px;
      font-family: 'Hind', sans-serif;
      transition: border-color .2s;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--primary)
    }

    .btn-main {
      width: 100%;
      padding: 13px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Baloo 2', sans-serif;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      box-shadow: 0 4px 14px rgba(79, 70, 229, .35);
    }

    .btn-main:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(79, 70, 229, .4)
    }

    .btn-secondary {
      width: 100%;
      padding: 11px;
      background: none;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      font-size: 14px;
      color: var(--muted);
      cursor: pointer;
      margin-top: 8px;
      font-family: 'Hind', sans-serif;
    }

    .err {
      color: var(--danger);
      font-size: 13px;
      margin-top: 8px;
      display: none;
      padding: 7px 11px;
      background: #fff1f2;
      border-radius: 8px;
      border-left: 3px solid var(--danger)
    }

    .err.show {
      display: block
    }

    .suc {
      color: var(--success);
      font-size: 13px;
      margin-top: 8px;
      display: none;
      padding: 7px 11px;
      background: #f0fdf4;
      border-radius: 8px;
      border-left: 3px solid var(--success)
    }

    .suc.show {
      display: block
    }

    .loading-txt {
      display: none;
      text-align: center;
      padding: 10px;
      color: var(--primary);
      font-size: 14px;
      font-weight: 600
    }

    .loading-txt.show {
      display: block
    }

    /* GET PASSWORD BUTTONS */
    .get-pw-wa {
      width: 100%;
      padding: 11px;
      margin-top: 10px;
      background: linear-gradient(135deg, #25D366, #128C7E);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Baloo 2', sans-serif;
      cursor: pointer;
      transition: transform .15s;
    }

    .get-pw-wa:hover {
      transform: translateY(-2px)
    }

    .get-pw-bot {
      width: 100%;
      padding: 11px;
      margin-top: 8px;
      background: linear-gradient(135deg, #2aabee, #229ed9);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Baloo 2', sans-serif;
      cursor: pointer;
      transition: transform .15s;
      text-decoration: none;
      display: block;
      text-align: center;
    }

    .get-pw-bot:hover {
      transform: translateY(-2px)
    }

    .wrong-warn {
      display: none;
      font-size: 13px;
      color: var(--danger);
      text-align: center;
      margin-top: 6px;
      font-weight: 600;
      padding: 6px;
      background: #fff1f2;
      border-radius: 8px;
    }

    .wrong-warn.show {
      display: block
    }

    /* RETURNING USER BOX */
    .return-box {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: #fff;
      border-radius: 14px;
      padding: 18px;
      text-align: center;
      margin-bottom: 14px;
    }

    .return-box h3 {
      font-family: 'Baloo 2', sans-serif;
      font-size: 17px;
      margin-bottom: 6px
    }

    .return-box p {
      font-size: 13px;
      opacity: .85;
      margin-bottom: 12px
    }

    .return-pw-btn {
      padding: 9px 22px;
      background: #fff;
      color: var(--primary);
      border: none;
      border-radius: 8px;
      font-family: 'Baloo 2', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    /* MORE QUESTIONS — GitHub folder/file browser */
    .mq-folder,
    .mq-file {
      padding: 12px 14px;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      margin-bottom: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: background .15s;
    }

    .mq-folder:hover,
    .mq-file:hover {
      background: #f0f4ff;
    }

    .mq-back {
      color: var(--primary);
      font-weight: 700;
    }

    .mq-loading,
    .mq-empty {
      text-align: center;
      color: var(--muted);
      padding: 20px;
      font-size: 14px;
    }
  </style>
  </style>
</head>

<body>

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="profile-btn" id="profileBtn" onclick="toggleProfile()">?</div>
    <div class="quiz-title">📚 UPSC Mains Practice Set 1</div>
    <div style="width:38px"></div>
  </div>

  <!-- PROFILE PANEL -->
  <div class="profile-panel" id="profilePanel">
    <button class="profile-close-btn" onclick="toggleProfile()">✕</button>
    <h3>👤 My Profile</h3>
    <div class="profile-field">
      <label>नाम</label>
      <input type="text" id="pName" placeholder="Name">
    </div>
    <div class="profile-field">
      <label>Mobile</label>
      <input type="tel" id="pMobile" placeholder="Mobile" maxlength="10">
    </div>
    <div class="profile-field">
      <label>Gender</label>
      <select id="pGender">
        <option value="Boy">Boy</option>
        <option value="Girl">Girl</option>
      </select>
    </div>
    <button class="profile-save-btn" onclick="saveProfile()">💾 Save Changes</button>
  </div>

  <!-- MAIN: QUESTIONS (shown first) -->
  <div class="main-wrap" id="mainWrap">
    <div id="questionsContainer"></div>
    <div class="submit-all-wrap">
      <button class="submit-all-btn" onclick="onProtectedAction('submitAll')">📤 Submit All Answers</button>
    </div>
    <div class="wa-section" style="margin-top:16px">
      <h2>💬 Answer Writing Group में जुड़ें</h2>
      <a href="#" id="whatsappLink" class="wa-link" onclick="return openWaGroup();return false;">Join WhatsApp Group</a>
    </div>
  </div>

  <!-- FAB -->
  <button class="fab" id="fab" onclick="onProtectedAction('seeAll')">
    🔓 See All Questions — Click Here
  </button>

  <!-- FAB: More Questions (GitHub JSON browser) -->
  <button class="fab" id="moreQFab" onclick="openMoreQuestions()"
    style="bottom:82px;background:var(--primary);color:#fff">
    📂 More Questions — Click Here
  </button>

  <!-- ======= MODAL: REGISTRATION ======= -->
  <div class="modal-overlay" id="regModal">
    <div class="modal-box">
      <button class="modal-close-btn" onclick="closeModal('regModal')">✕</button>
      <div class="modal-title">📝 पंजीकरण</div>
      <div class="form-group">
        <label>नाम *</label>
        <input type="text" id="r_name" placeholder="अपना नाम दर्ज करें">
      </div>
      <div class="form-group">
        <label>Mobile *</label>
        <input type="tel" id="r_mobile" placeholder="10 अंकों का नंबर" maxlength="10">
      </div>
      <div class="form-group">
        <label>Gender *</label>
        <select id="r_gender">
          <option value="">चुनें</option>
          <option value="Boy">Boy</option>
          <option value="Girl">Girl</option>
        </select>
      </div>
      <div class="err" id="r_err">कृपया सभी फ़ील्ड भरें</div>
      <button class="btn-main" onclick="submitReg()">आगे बढ़ें →</button>
      <button class="btn-secondary" onclick="closeModal('regModal')">Cancel</button>
    </div>
  </div>

  <!-- ======= MODAL: PASSWORD ======= -->
  <div class="modal-overlay" id="pwModal">
    <div class="modal-box">
      <button class="modal-close-btn" onclick="closeModal('pwModal')">✕</button>
      <div class="modal-title">🔐 Password दर्ज करें</div>

      <!-- Returning user greeting -->
      <div class="return-box" id="returnBox" style="display:none">
        <h3 id="returnName">Welcome back!</h3>
        <p>आप पहले register कर चुके हैं।</p>
      </div>

      <div class="form-group" style="margin-top:8px">
        <label>Password *</label>
        <input type="password" id="pw_input" placeholder="Password यहाँ डालें"
          onkeydown="if(event.key==='Enter')submitPassword()">
      </div>
      <div class="wrong-warn" id="wrongWarn"></div>
      <button class="btn-main" onclick="submitPassword()">सत्यापित करें ✓</button>
      <div class="err" id="pw_err">गलत Password</div>
      <div class="suc" id="pw_suc">✓ सत्यापन सफल!</div>
      <div class="loading-txt" id="pw_load">सत्यापन हो रहा है...</div>

      <div style="margin-top:16px;text-align:center;font-size:13px;color:var(--muted);margin-bottom:6px">Password नहीं
        है?</div>
      <div id="getPwArea"></div>

      <button class="btn-secondary" onclick="closeModal('pwModal')">Cancel</button>
    </div>
  </div>

  <!-- MORE QUESTIONS — ab ye bhi main quiz page jaisa hi full-page dikhega, popup nahi -->
  <div class="main-wrap" id="moreQWrap" style="display:none">
    <div class="topic-name"
      style="margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:10px">
      <span id="moreQCrumb">📂 Sources</span>
      <button class="btn-secondary" id="moreQCloseBtn" style="width:auto;padding:8px 16px;margin:0;white-space:nowrap"
        onclick="closeMoreQuestions()">✕ Close</button>
    </div>
    <div id="moreQBody"></div>
  </div>

  <script>
    // ============================================================
    // CONFIG
    // ============================================================
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwPCgjvu48aDtyNHOdNYLo3tLfhSyBtGv1yrmkftnrftAgEvLXeqnbRXZ_HC5g4O6zNUQ/exec';
    const QUIZ_NAME = 'UPSC Mains Practice Set 1';
    const MY_WA_NO = '919649346723';
    const BOYS_BOT = 'https://t.me/LecturesG_bot';
    const FREE_Q = 2; // first N questions visible without login

    // "More Questions" ke liye GitHub repos — dono jagah se fetch hoga
    const JSON_REPOS = [
      { key: 'ans', name: 'UPSC_Mains_answer_writing', owner: 'DineshIAS96', repo: 'UPSC_Mains_answer_writing', branch: 'main' },
      { key: 'json', name: 'UPSC-Mains-JSON', owner: 'StudyUPSC', repo: 'UPSC-Mains-JSON', branch: 'main' }
    ];

    // ============================================================
    // USER STATE
    // ============================================================
    let user = { name: '', mobile: '', gender: '', quizName: QUIZ_NAME };
    let isLoggedIn = false;    // password verified this session
    let wrongAttempts = 0;
    let pendingAction = '';    // what triggered the auth flow

    function loadSavedUser() {
      try {
        const s = localStorage.getItem('upsc_user');
        if (s) {
          const u = JSON.parse(s);
          if (u.name && u.mobile && u.gender) {
            user = { ...u, quizName: QUIZ_NAME };
            updateAvatarBtn();
            return true;

    async function submitPassword() {
      const pw = document.getElementById('pw_input').value.trim();
      const err = document.getElementById('pw_err');
      const suc = document.getElementById('pw_suc');
      const load = document.getElementById('pw_load');
      if (!pw) { err.textContent = 'Password डालें'; err.classList.add('show'); return; }
      err.classList.remove('show'); suc.classList.remove('show');
      load.classList.add('show');

      try {
        const res = await fetch(SCRIPT_URL, {
          method: 'POST', headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ action: 'verifyPassword', gender: user.gender, password: pw, name: user.name, mobile: user.mobile, quizName: QUIZ_NAME })
        });
        const result = await res.json();
        load.classList.remove('show');
        if (result.success) {
          suc.classList.add('show');
          isLoggedIn = true;
          unlockAllQuestions();
          setTimeout(() => {
            closeModal('pwModal');
            executePendingAction();
          }, 900);
        } else {
          wrongAttempts++;
          handleWrongPw(pw);
        }
      } catch (e) {
        // CORS fallback
        load.classList.remove('show');
        isLoggedIn = true;
        suc.classList.add('show');
        unlockAllQuestions();
        setTimeout(() => { closeModal('pwModal'); executePendingAction(); }, 900);
      }
    }

    function handleWrongPw(pw) {
      const err = document.getElementById('pw_err');
      const warn = document.getElementById('wrongWarn');
      err.textContent = '❌ गलत Password'; err.classList.add('show');
      track({ action: 'wrongPassword', name: user.name, mobile: user.mobile, gender: user.gender, quizName: QUIZ_NAME, attempt: wrongAttempts, tried: pw });

      if (user.gender === 'Girl') {
        const left = 2 - wrongAttempts;
        if (left > 0) { warn.textContent = `⚠️ ${wrongAttempts} बार गलत — ${left} chance बाकी हैं`; warn.classList.add('show'); }
        if (wrongAttempts >= 2) {
          warn.textContent = '🚨 2 बार गलत! WhatsApp redirect हो रहा है...'; warn.classList.add('show');
          setTimeout(() => {
            const msg = encodeURIComponent(`🚨 2 बार Wrong Password\n\n📚 Quiz: ${QUIZ_NAME}\n👤 Name: ${user.name}\n📱 Mobile: ${user.mobile}\n\nPassword chahiye`);
            window.open(`https://wa.me/${MY_WA_NO}?text=${msg}`, '_blank');
          }, 1200);
        }
      }
    }

   async function renderMoreQRoot() {
      document.getElementById('moreQCrumb').textContent = '📂 More Questions';
      const box = document.getElementById('moreQBody');
      box.innerHTML = '<div class="mq-loading">Loading...</div>';

      let html = '';
      for (const repo of JSON_REPOS) {
        try {
          const url = `https://api.github.com/repos/${repo.owner}/${repo.repo}/contents/?ref=${repo.branch}`;
          const res = await fetch(url);
          const items = await res.json();
          if (!Array.isArray(items)) continue;

          const folders = items.filter(i => i.type === 'dir');
          const files = items.filter(i => i.type === 'file' && i.name.toLowerCase().endsWith('.json'));

          folders.forEach(f => {
            html += `<div class="mq-folder" onclick="enterRepoFolder('${repo.key}','${f.path}')">📁 ${f.name}</div>`;
          });
          files.forEach(f => {
            html += `<div class="mq-file" onclick="openJsonFile('${repo.key}','${f.path}')">📄 ${f.name}</div>`;
          });
        } catch (e) { }
      }

      box.innerHTML = html || '<div class="mq-empty">Kuch nahi mila</div>';
    }

    async function enterRepoFolder(repoKey, path) {
      const repo = JSON_REPOS.find(r => r.key === repoKey);
      document.getElementById('moreQCrumb').textContent = `📂 ${repo.name}/${path}`;
      const box = document.getElementById('moreQBody');
      box.innerHTML = '<div class="mq-loading">Loading...</div>';

      const url = `https://api.github.com/repos/${repo.owner}/${repo.repo}/contents/${path}?ref=${repo.branch}`;
      try {
        const res = await fetch(url);
        const items = await res.json();
        if (!Array.isArray(items)) { box.innerHTML = '<div class="mq-empty">Yaha kuch nahi mila</div>'; return; }

        let html = '';
        if (path !== '') {
          const parentPath = path.split('/').slice(0, -1).join('/');
          html += `<div class="mq-folder mq-back" onclick="enterRepoFolder('${repoKey}','${parentPath}')">⬅ Back</div>`;
      } else {
          html += `<div class="mq-folder mq-back" onclick="renderMoreQRoot()">⬅ Back</div>`;
        }

        const folders = items.filter(i => i.type === 'dir');
        const files = items.filter(i => i.type === 'file' && i.name.toLowerCase().endsWith('.json'));

        folders.forEach(f => {
          html += `<div class="mq-folder" onclick="enterRepoFolder('${repoKey}','${f.path}')">📁 ${f.name}</div>`;
        });
        files.forEach(f => {
          html += `<div class="mq-file" onclick="openJsonFile('${repoKey}','${f.path}')">📄 ${f.name}</div>`;
        });

        if (!folders.length && !files.length) html += '<div class="mq-empty">Yaha kuch nahi hai</div>';
        box.innerHTML = html;
      } catch (e) {
        box.innerHTML = '<div class="mq-empty">Load nahi ho paaya</div>';
      }
    }

    async function openJsonFile(repoKey, filePath, focusQIdx) {
      const repo = JSON_REPOS.find(r => r.key === repoKey);
      document.getElementById('moreQCrumb').textContent = `📄 ${repo.name}/${filePath}`;
      const box = document.getElementById('moreQBody');
      box.innerHTML = '<div class="mq-loading">Loading...</div>';

      const rawUrl = `https://raw.githubusercontent.com/${repo.owner}/${repo.repo}/${repo.branch}/${filePath}`;
      try {
        const res = await fetch(rawUrl);
        const parsed = await res.json();
        const subjects = Array.isArray(parsed) ? parsed : (parsed && parsed.subject ? [parsed] : []);
        renderJsonQuestions(subjects, repoKey, filePath, focusQIdx);
      } catch (e) {
        box.innerHTML = '<div class="mq-empty">JSON load nahi ho paaya</div>';
      }
    }

    function renderJsonQuestions(subjects, repoKey, filePath, focusQIdx) {
      const box = document.getElementById('moreQBody');
      const parentPath = filePath.split('/').slice(0, -1).join('/');
      let html = `<div class="mq-folder mq-back" onclick="enterRepoFolder('${repoKey}','${parentPath}')">⬅ Back</div>`;
      let idx = 0;
      subjects.forEach(sub => {
        html += `<div class="subject-block"><div class="subject-hd">${sub.subject}<div class="subject-src">📖 ${sub.source || ''}</div></div>`;
        (sub.topics || []).forEach(topic => {
          html += `<div class="topic-block"><div class="topic-name">📌 ${topic.topicName}</div>`;
          (topic.questions || []).forEach(q => {
            const myIdx = idx;
            const qid = `mq_${myIdx}`;
            const safeQ = q.question.replace(/'/g, '&apos;').replace(/\n/g, ' ');
            html += `
        <div class="q-item" id="item_${qid}">
          <div class="q-header">
            <div class="q-text"><strong>Q.</strong> ${q.question.replace(/\n/g, '<br>')}</div>
            <div class="q-actions">
              <button class="demo-btn" onclick="onProtectedAction('demo','${qid}')">👁 See Demo Answer</button>
              <button class="submit-btn" onclick="onProtectedAction('submit','${qid}','${safeQ}')">📤 Submit Answer</button>
            </div>
            <div class="q-actions" style="margin-top:6px">
              <button class="demo-btn" onclick="shareQuestion('json','${repoKey}','${filePath}',${myIdx})">📤 Share</button>
              <button class="demo-btn" onclick="copyQuestionLink('json','${repoKey}','${filePath}',${myIdx})">🔗 Copy Link</button>
            </div>
          </div>
          <div class="demo-answer" id="ans_${qid}">
            <strong>📝 Demo Answer:</strong><br><br>${q.answer.replace(/\n/g, '<br>')}
          </div>
        </div>`;
            idx++;
          });
          html += `</div>`;
        });
        html += `</div>`;
      });
      box.innerHTML = html;

      if (focusQIdx !== undefined && focusQIdx !== null && !isNaN(focusQIdx)) {
        setTimeout(() => {
          const el = document.getElementById(`item_mq_${focusQIdx}`);
          if (el) {
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            el.style.boxShadow = '0 0 0 3px var(--accent)';
            document.getElementById(`ans_mq_${focusQIdx}`).classList.add('show');
          }
        }, 300);
      }
    }

    // ============================================================
    // SHARE + COPY LINK — kisi bhi question ke liye direct link
    // ============================================================
    function buildQuestionLink(type, a, b, c) {
      const base = location.origin + location.pathname;
      if (type === 'local') return `${base}?local=${a}`;
      return `${base}?src=${a}&file=${encodeURIComponent(b)}&q=${c}`;
    }

    function shareQuestion(type, a, b, c) {
      const link = buildQuestionLink(type, a, b, c);
      const msg = encodeURIComponent(`📚 ${QUIZ_NAME}\n\nYe question dekhein:\n${link}`);
      window.open(`https://wa.me/?text=${msg}`, '_blank');
    }

    function copyQuestionLink(type, a, b, c) {
      const link = buildQuestionLink(type, a, b, c);
      navigator.clipboard.writeText(link).then(() => {
        alert('Link copy ho gaya ✅');
      }).catch(() => {
        prompt('Link copy karein:', link);
      });
    }

    // URL me ?local=... ya ?src=...&file=...&q=... ho to seedha wahi question khol do
    function handleDeepLink() {
      const params = new URLSearchParams(location.search);
      const localQid = params.get('local');
      const src = params.get('src');
      const file = params.get('file');
      const qIdx = params.get('q');

      if (localQid) {
        setTimeout(() => {
          const el = document.getElementById('item_' + localQid);
          if (el) {
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            document.getElementById('ans_' + localQid).classList.add('show');
          }
        }, 500);
        return;
      }

      if (src && file) {
        openMoreQuestions();
        openJsonFile(src, file, qIdx !== null ? parseInt(qIdx) : null);
      }
    }

          openPasswordModal();
        } else {
          openModal('regModal');
        }
        return false;
      }
      doOpenWaGroup();
      return false;
    }
    function doOpenWaGroup() {
      if (user.gender === 'Girl') {
        const msg = encodeURIComponent(`📚 Answer Writing Group Join Request\n\n📚 Quiz: ${QUIZ_NAME}\n👤 Name: ${user.name}\n📱 Mobile: ${user.mobile}\n🚻 Gender: ${user.gender}\n\nMujhe Girls UPSC Answer Writing Group mein add karein`);
        window.open(`https://wa.me/${MY_WA_NO}?text=${msg}`, '_blank');
      } else {
        window.open('https://chat.whatsapp.com/CElwHrE2iMbI3Y3GNVMzq3', '_blank');
      }
    }

    // ============================================================
    // TELEGRAM TRACKING
    // ============================================================
    async function track(data) {
      try {
        await fetch(SCRIPT_URL, {
          method: 'POST', headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify(data)
        });
      } catch (e) { }
    }

    // ============================================================
    // SCROLL → show FAB after first 2 questions
    // ============================================================
    function setupFAB() {
      if (isLoggedIn) return;
      const fab = document.getElementById('fab');
      let shown = false;
      window.addEventListener('scroll', () => {
        if (isLoggedIn) { fab.style.display = 'none'; return; }
        if (window.scrollY > 120 && !shown) { shown = true; fab.style.display = 'flex'; }
      });
    }

    // ============================================================
    // INIT
    // ============================================================
if (questionsData.length === 0) {
      // Local questions na ho to seedha "More Questions" wala page khul jaye — Close button ki zarurat nahi
      document.getElementById('moreQCloseBtn').style.display = 'none';
      openMoreQuestions();
    } else {
      renderQuestions();
      setupFAB();
    }
    updateAvatarBtn();
    updateWaLink();
    handleDeepLink();
  </script>
</body>

</html>
